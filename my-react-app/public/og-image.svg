<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">SQB - بنك أسئلة SMLE وبرومترك</title>
  <desc id="desc">منصة عربية للتحضير لاختبار الهيئة السعودية للتخصصات الصحية وبرومترك.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081121" />
      <stop offset="55%" stop-color="#0f1f3a" />
      <stop offset="100%" stop-color="#0b766e" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="36" />
  <circle cx="1040" cy="120" r="120" fill="rgba(255,255,255,0.08)" />
  <circle cx="180" cy="540" r="180" fill="rgba(103,232,249,0.08)" />
  <g transform="translate(110 110)">
